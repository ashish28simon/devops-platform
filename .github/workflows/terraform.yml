name: Terraform CI

on:
  push:
    branches:
      - main
      - dev
      - feature/*

permissions:
  id-token: write
  contents: read

jobs:

  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/518343262348/locations/global/workloadIdentityPools/github-pool-1/providers/github-provider
          service_account: github-actions-sa@motocorp-simon.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan -var-file=../environments/dev/terraform.tfvars
        working-directory: terraform


  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/518343262348/locations/global/workloadIdentityPools/github-pool-1/providers/github-provider
          service_account: github-actions-sa@motocorp-simon.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=../environments/dev/terraform.tfvars
        working-directory: terraform