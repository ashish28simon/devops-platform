name: Build Push Deploy

on:
  push:
    paths:
      - patient-service/**
      - k8s/patient-service/**
      - .github/workflows/build-push-deploy.yml
env:
  IMAGE_TAG: ${{ github.sha }}      

jobs:

  deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/518343262348/locations/global/workloadIdentityPools/github-pool-1/providers/github-provider
        service_account: github-actions-sa@motocorp-simon.iam.gserviceaccount.com

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker asia-south1-docker.pkg.dev

    - name: Build Docker image
      run: |
        docker build -t asia-south1-docker.pkg.dev/motocorp-simon/microservices-repo/patient-service:${IMAGE_TAG} .

    - name: Push Docker image
      run: |
        docker push asia-south1-docker.pkg.dev/motocorp-simon/microservices-repo/patient-service:${IMAGE_TAG}

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials devops-platform-cluster \
        --zone asia-south1-a \
        --project motocorp-simon

    - name: Install GKE auth plugin
      run: |
        gcloud components install gke-gcloud-auth-plugin --quiet
    
    - name: Deploy to GKE
      run: |
        echo "Deploying image with tag: $IMAGE_TAG"
        kubectl set image deployment/patient-service \
        patient-service=asia-south1-docker.pkg.dev/motocorp-simon/microservices-repo/patient-service:${IMAGE_TAG}

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/patient-service/deployment.yaml
        kubectl apply -f k8s/patient-service/service.yaml
        kubectl apply -f k8s/patient-service/ingress.yaml